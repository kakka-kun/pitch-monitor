<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pitch Monitor — ピッチ / 音域 / ビブラート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface0: rgba(255, 255, 255, .03);
      --surface1: rgba(255, 255, 255, .06);
      --surface2: rgba(255, 255, 255, .10);
      --border0: rgba(255, 255, 255, .06);
      --border1: rgba(255, 255, 255, .10);
      --text: #e8ecf5;
      --muted: #8993a8;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --green: #22c55e;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --r: 16px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80vw 60vh at 15% 0%, rgba(124, 58, 237, .18) 0%, transparent 65%),
        radial-gradient(ellipse 60vw 50vh at 85% 5%, rgba(6, 182, 212, .14) 0%, transparent 65%),
        radial-gradient(ellipse 100vw 40vh at 50% 100%, rgba(34, 197, 94, .07) 0%, transparent 70%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 24px 40px;
    }

    /* ── wrapper: 横幅いっぱい ── */
    .wrap {
      width: 100%;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(124, 58, 237, .4);
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.2px;
      color: var(--text);
    }

    .sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── buttons ── */
    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border1);
      background: var(--surface1);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      font-family: 'Inter', system-ui, sans-serif;
      transition: all .15s ease;
      letter-spacing: -.1px;
      backdrop-filter: blur(8px);
    }

    button:hover:not(:disabled) {
      background: var(--surface2);
      border-color: rgba(255, 255, 255, .2);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .primary {
      border-color: rgba(124, 58, 237, .5);
      background: linear-gradient(135deg, rgba(124, 58, 237, .35), rgba(6, 182, 212, .2));
      box-shadow: 0 0 24px rgba(124, 58, 237, .2), inset 0 1px 0 rgba(255, 255, 255, .08);
    }

    .primary:hover:not(:disabled) {
      box-shadow: 0 0 32px rgba(124, 58, 237, .4), inset 0 1px 0 rgba(255, 255, 255, .12);
    }

    .danger {
      border-color: rgba(244, 63, 94, .4);
      background: linear-gradient(135deg, rgba(244, 63, 94, .22), rgba(244, 63, 94, .08));
    }

    .ghost {
      border-color: var(--border0);
      background: transparent;
      font-size: 12.5px;
      padding: 7px 12px;
    }

    /* ── cards ── */
    .card {
      background: linear-gradient(170deg, rgba(16, 22, 40, .95), rgba(10, 16, 32, .95));
      border: 1px solid var(--border0);
      border-radius: var(--r);
      padding: 18px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .1), transparent);
    }

    /* ── top row ── */
    .topRow {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      align-items: stretch;
    }

    @media (max-width: 780px) {
      .topRow {
        grid-template-columns: 1fr;
      }
    }

    /* ── pitch display ── */
    .bigPitch {
      padding: 18px 20px;
      border-radius: 12px;
      background: var(--surface0);
      border: 1px solid var(--border0);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .pitch-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pitchLabel {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      background: linear-gradient(135deg, #e8ecf5, #a8b4cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pitchMeta {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .1px;
    }

    .hint {
      font-size: 11px;
      color: rgba(137, 147, 168, .6);
    }

    /* ── vibrato box ── */
    .vibBox {
      min-width: unset;
      padding: 18px;
      border-radius: 12px;
      background: var(--surface0);
      border: 1px solid var(--border0);
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: space-between;
      transition: border-color .3s ease, box-shadow .3s ease;
    }

    .vibBox.vib-on {
      border-color: rgba(124, 58, 237, .4);
      box-shadow: 0 0 30px rgba(124, 58, 237, .15);
    }

    .vibBox.vib-stable {
      border-color: rgba(34, 197, 94, .45);
      box-shadow: 0 0 30px rgba(34, 197, 94, .15);
    }

    .vibBox.vib-weak {
      border-color: rgba(245, 158, 11, .35);
      box-shadow: 0 0 20px rgba(245, 158, 11, .10);
    }

    .vibTitle {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .vibState {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      transition: all .3s ease;
    }

    .vibState .vib-emoji {
      display: inline-block;
      font-size: 28px;
      transition: transform .3s ease;
    }

    .vibBox.vib-on .vib-emoji,
    .vibBox.vib-stable .vib-emoji {
      animation: vibEmoji .6s ease-in-out infinite alternate;
    }

    @keyframes vibEmoji {
      from {
        transform: rotate(-8deg) scale(1);
      }

      to {
        transform: rotate(8deg) scale(1.1);
      }
    }

    .vibLabel {
      font-size: 12.5px;
      font-weight: 500;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border1);
      background: var(--surface0);
      font-size: 11.5px;
      font-weight: 600;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: .3px;
      width: fit-content;
      transition: all .3s ease;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s ease;
    }

    .badge.badge-stable::before {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .badge.badge-on::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .badge.badge-weak::before {
      background: var(--amber);
    }

    /* ── vibrato strength bar ── */
    .vibStrengthWrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .vibStrengthLabel {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }

    .vibStrengthTrack {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      overflow: hidden;
      position: relative;
    }

    .vibStrengthFill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .18s ease;
    }

    .vibStrengthFill.fill-stable {
      background: linear-gradient(90deg, var(--green), var(--accent2));
    }

    .vibStrengthFill.fill-weak {
      background: linear-gradient(90deg, var(--amber), rgba(245, 158, 11, .5));
    }

    /* ── canvas ── */
    .canvasWrap {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: var(--surface0);
      border: 1px solid var(--border0);
      position: relative;
    }

    canvas {
      width: 100%;
      height: 240px;
      display: block;
      border-radius: 8px;
    }

    /* ── stats pills ── */
    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11.5px;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border0);
      background: var(--surface0);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
    }

    .pill:hover {
      border-color: var(--border1);
      color: var(--text);
    }

    /* ── settings ── */
    details {
      margin-top: 14px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: .2px;
      user-select: none;
      padding: 4px 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }

    summary:hover {
      color: var(--text);
    }

    details[open] summary {
      color: var(--text);
    }

    .settings-inner {
      margin-top: 14px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border0);
      background: rgba(0, 0, 0, .15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border1);
      border-radius: 8px;
      background: rgba(0, 0, 0, .25);
      color: var(--text);
      outline: none;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      transition: border-color .15s;
    }

    .input:focus {
      border-color: rgba(124, 58, 237, .5);
    }

    .rangeRow {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .rangeRow input[type="range"] {
      flex: 1 1 auto;
    }

    .numMini {
      width: 80px;
      padding: 6px 8px;
      border: 1px solid var(--border1);
      border-radius: 8px;
      background: rgba(0, 0, 0, .25);
      color: var(--text);
      outline: none;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
      text-align: right;
    }

    input[type="range"] {
      accent-color: var(--accent);
      height: 3px;
    }

    .row2 {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border0);
    }

    .notice {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(137, 147, 168, .6);
      font-style: italic;
    }

    /* ── animations ── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      animation: fadeIn .4s ease backwards;
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      body {
        padding: 14px 14px 32px;
      }

      .pitchLabel {
        font-size: 44px;
      }

      .vibBox {
        min-width: unset;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <div>
          <h1>Pitch Monitor</h1>
          <div class="sub">hiA表記 &nbsp;/&nbsp; 音域グラフ &nbsp;/&nbsp; ビブラート検知</div>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="start">🎙️ 開始</button>
        <button id="stop" disabled>⏹ 停止</button>
        <button class="danger" id="reset" disabled>🧹 リセット</button>
      </div>
    </header>

    <div class="card">
      <div class="topRow">
        <!-- pitch display -->
        <div class="bigPitch">
          <div class="pitch-section-label">現在の音程</div>
          <div class="pitchLabel" id="hiLabel">---</div>
          <div class="pitchMeta" id="detail">Hz: -- &nbsp;/&nbsp; Note: -- &nbsp;/&nbsp; Cents: --</div>
          <div class="hint">目安：A4 = hiA（440Hz） &nbsp;/&nbsp; C4 = mid2C</div>
        </div>

        <!-- vibrato box -->
        <div class="vibBox" id="vibBox">
          <div class="vibTitle">Vibrato Detector</div>

          <div>
            <div class="vibState" id="vibState">
              <span class="vib-emoji" id="vibEmoji">😐</span>
            </div>
            <div class="vibLabel" id="vibLabel">まだビブラートなし</div>
          </div>

          <div>
            <div class="badge" id="vibBadge">判定: OFF</div>
          </div>

          <div class="vibStrengthWrap">
            <div class="vibStrengthLabel">
              <span>強さ</span>
              <span id="vibStrengthPct">0%</span>
            </div>
            <div class="vibStrengthTrack">
              <div class="vibStrengthFill" id="vibStrengthFill"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- graph -->
      <div class="canvasWrap">
        <canvas id="graph" width="1200" height="240"></canvas>

        <div class="stats">
          <div class="pill" id="minInfo">Min: --</div>
          <div class="pill" id="maxInfo">Max: --</div>
          <div class="pill" id="spanInfo">Range: --</div>
          <div class="pill" id="speedInfo" style="font-family:'JetBrains Mono',monospace">Graph: --</div>
          <div class="pill" id="gainInfo" style="font-family:'JetBrains Mono',monospace">Mic Gain: --</div>
        </div>

        <details>
          <summary>⚙ 設定（Cookie保存）</summary>

          <div class="settings-inner">
            <div class="grid">
              <div class="field">
                <label>グラフ表示 Hz 下限</label>
                <input class="input" id="minHz" type="number" value="65" min="20" max="2000" step="1">
              </div>
              <div class="field">
                <label>グラフ表示 Hz 上限</label>
                <input class="input" id="maxHz" type="number" value="1200" min="50" max="5000" step="1">
              </div>
              <div class="field">
                <label>ビブラート解析窓 秒（2.5推奨）</label>
                <input class="input" id="vibWin" type="number" value="2.5" min="0.8" max="5" step="0.1">
              </div>
            </div>

            <div class="grid">
              <div class="field">
                <label>🎛 マイクブースト（0%〜400%）</label>
                <div class="rangeRow">
                  <input id="micGainR" type="range" min="0" max="400" value="100" step="1">
                  <input class="numMini" id="micGainN" type="number" min="0" max="400" value="100" step="1">
                </div>
              </div>

              <div class="field">
                <label>グラフ表示時間（秒）</label>
                <div class="rangeRow">
                  <input id="graphSecR" type="range" min="2" max="20" value="8" step="1">
                  <input class="numMini" id="graphSecN" type="number" min="2" max="20" value="8" step="1">
                </div>
              </div>

              <div class="field">
                <label>点の追加間隔（ms）</label>
                <div class="rangeRow">
                  <input id="graphMsR" type="range" min="20" max="300" value="60" step="5">
                  <input class="numMini" id="graphMsN" type="number" min="20" max="300" value="60" step="5">
                </div>
              </div>

              <div class="field">
                <label>グラフ高さ（px）</label>
                <div class="rangeRow">
                  <input id="graphHR" type="range" min="160" max="500" value="240" step="10">
                  <input class="numMini" id="graphHN" type="number" min="160" max="500" value="240" step="10">
                </div>
              </div>

              <div class="field">
                <label>線の太さ</label>
                <div class="rangeRow">
                  <input id="graphLWR" type="range" min="1" max="5" value="2" step="1">
                  <input class="numMini" id="graphLWN" type="number" min="1" max="5" value="2" step="1">
                </div>
              </div>
            </div>

            <div class="row2">
              <button class="ghost" id="saveBtn">💾 設定を保存</button>
              <button class="ghost" id="loadBtn">↩ 設定を読み込み</button>
              <button class="ghost" id="clearBtn">🧽 保存設定を消す</button>
            </div>

            <div class="notice">
              ブーストを上げすぎるとノイズも一緒に増幅します。
            </div>
          </div>
        </details>
      </div>
    </div>
  </div>

  <script>
    (() => {
      // ===== Cookie helper =====
      const COOKIE_KEY = "pitch_tool_settings_v5";
      const COOKIE_DAYS = 365;

      const setCookie = (name, value, days) => {
        const d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
      };
      const getCookie = (name) => {
        const target = name + "=";
        for (const p of document.cookie.split(";").map(s => s.trim())) {
          if (p.startsWith(target)) return decodeURIComponent(p.substring(target.length));
        }
        return null;
      };
      const deleteCookie = (name) => {
        document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
      };

      // ========= UI =========
      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");
      const resetBtn = document.getElementById("reset");

      const hiLabel = document.getElementById("hiLabel");
      const detail = document.getElementById("detail");

      const vibBox = document.getElementById("vibBox");
      const vibEmoji = document.getElementById("vibEmoji");
      const vibLabel = document.getElementById("vibLabel");
      const vibBadge = document.getElementById("vibBadge");
      const vibStrFill = document.getElementById("vibStrengthFill");
      const vibStrPct = document.getElementById("vibStrengthPct");

      const canvas = document.getElementById("graph");
      const ctx = canvas.getContext("2d");

      const minInfo = document.getElementById("minInfo");
      const maxInfo = document.getElementById("maxInfo");
      const spanInfo = document.getElementById("spanInfo");
      const speedInfo = document.getElementById("speedInfo");
      const gainInfo = document.getElementById("gainInfo");

      const minHzInput = document.getElementById("minHz");
      const maxHzInput = document.getElementById("maxHz");
      const vibWinInput = document.getElementById("vibWin");

      const micGainR = document.getElementById("micGainR");
      const micGainN = document.getElementById("micGainN");

      const graphSecR = document.getElementById("graphSecR");
      const graphSecN = document.getElementById("graphSecN");
      const graphMsR = document.getElementById("graphMsR");
      const graphMsN = document.getElementById("graphMsN");
      const graphHR = document.getElementById("graphHR");
      const graphHN = document.getElementById("graphHN");
      const graphLWR = document.getElementById("graphLWR");
      const graphLWN = document.getElementById("graphLWN");

      const saveBtn = document.getElementById("saveBtn");
      const loadBtn = document.getElementById("loadBtn");
      const clearBtn = document.getElementById("clearBtn");

      function toast(msg) { vibBadge.textContent = msg; }

      // ========= Audio =========
      let audioCtx, analyser, buf, src, stream, rafId;
      let gainNode = null;

      // ========= Settings =========
      let MIN_HZ = 65;
      let MAX_HZ = 1200;

      let VIB_WINDOW_SEC = 2.5;

      // ビブラート判定閾値（固定）
      const VIB_F_MIN = 4.0;   // ビブラート周波数下限 Hz
      const VIB_F_MAX = 8.0;   // ビブラート周波数上限 Hz
      const VIB_DEPTH_MIN = 0.12; // MIDIセミトーン揺れ幅最小（ビブラートらしい揺れ）
      const VIB_SNR_ON = 2.8;  // ON判定のSNR閾値
      const VIB_SNR_STABLE = 4.5;  // STABLE判定のSNR閾値
      const VIB_LOSE_SEC = 0.3;  // 判定を維持する秒数

      // Graph speed/appearance
      let GRAPH_WINDOW_SEC = 8;
      let GRAPH_SAMPLE_MS = 60;
      let GRAPH_LINE_W = 2;
      let HISTORY_LEN = 240;

      // Mic boost (0.0 - 4.0)
      let MIC_GAIN = 1.0;

      // ========= State =========
      let history = [];
      let minMidi = null;
      let maxMidi = null;

      let vibSeries = [];
      let vibHold = 0;      // 0〜1 スムージング値
      let lastVibGoodT = 0;
      let lastVibBadT = 0;
      let consecutiveVibFrames = 0;

      let lastGraphSampleT = 0;

      // ========= Pitch helpers =========
      const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const freqToMidi = (f) => 69 + 12 * Math.log2(f / 440);
      function midiToNote(midiFloat) {
        const m = Math.round(midiFloat);
        const name = NOTE_NAMES[(m % 12 + 12) % 12];
        const octave = Math.floor(m / 12) - 1;
        const cents = Math.round((midiFloat - m) * 100);
        return { name, octave, cents, midi: m, midiFloat };
      }
      function octavePrefix(octave) {
        if (octave <= 1) return "low";
        if (octave === 2) return "mid1";
        if (octave === 3) return "mid2";
        if (octave === 4) return "hi";
        if (octave === 5) return "hihi";
        return "hihihi";
      }
      const formatHi = (name, octave) => `${octavePrefix(octave)}${name.replace("#", "is")}`;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

      // ========= Range <-> Number sync =========
      function bindRangeNumber(rangeEl, numEl, onChange) {
        const min = Number(rangeEl.min);
        const max = Number(rangeEl.max);
        const step = Number(rangeEl.step || 1);

        const clampTo = (v) => {
          if (!isFinite(v)) return Number(rangeEl.value);
          v = clamp(v, min, max);
          const snapped = Math.round((v - min) / step) * step + min;
          return Number(snapped.toFixed(10));
        };
        const setBoth = (v, silent = false) => {
          const vv = clampTo(v);
          rangeEl.value = String(vv);
          numEl.value = String(vv);
          if (!silent && onChange) onChange(vv);
        };
        rangeEl.addEventListener("input", () => setBoth(Number(rangeEl.value)));
        rangeEl.addEventListener("change", () => setBoth(Number(rangeEl.value)));
        numEl.addEventListener("input", () => setBoth(Number(numEl.value)));
        numEl.addEventListener("change", () => setBoth(Number(numEl.value)));
        setBoth(Number(rangeEl.value), true);
        return { set: setBoth };
      }

      // ========= Autocorrelation =========
      function autoCorrelate(buf, sampleRate) {
        let rms = 0;
        for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms / buf.length);
        if (rms < 0.008) return -1;

        let start = 0, end = buf.length - 1;
        while (start < end && Math.abs(buf[start]) < 0.2) start++;
        while (end > start && Math.abs(buf[end]) < 0.2) end--;
        const trimmed = buf.slice(start, end);
        const size = trimmed.length;
        if (size < 64) return -1;
        const c = new Float32Array(size);

        for (let lag = 0; lag < size; lag++) {
          let sum = 0;
          for (let i = 0; i < size - lag; i++) sum += trimmed[i] * trimmed[i + lag];
          c[lag] = sum;
        }

        let d = 0;
        while (d < size - 1 && c[d] > c[d + 1]) d++;

        let maxval = -1, maxpos = -1;
        for (let i = d; i < size; i++) {
          if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
        }
        if (maxpos <= 0) return -1;

        const x1 = maxpos - 1, x2 = maxpos, x3 = maxpos + 1;
        if (x1 >= 0 && x3 < size) {
          const y1 = c[x1], y2 = c[x2], y3 = c[x3];
          const a = (y1 + y3 - 2 * y2) / 2;
          const b = (y3 - y1) / 2;
          if (a) {
            const shift = -b / (2 * a);
            return sampleRate / (maxpos + shift);
          }
        }
        return sampleRate / maxpos;
      }

      // ========= Graph =========
      function recomputeHistoryLen() {
        HISTORY_LEN = Math.max(10, Math.round((GRAPH_WINDOW_SEC * 1000) / GRAPH_SAMPLE_MS));
        speedInfo.textContent = `Graph: ${GRAPH_WINDOW_SEC}s / ${GRAPH_SAMPLE_MS}ms / pts≈${HISTORY_LEN}`;
      }

      function drawGraph() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        // background
        ctx.fillStyle = "rgba(0,0,0,.18)";
        ctx.fillRect(0, 0, w, h);

        const minMidiView = freqToMidi(MIN_HZ);
        const maxMidiView = freqToMidi(MAX_HZ);

        // octave grid
        for (let m = Math.ceil(minMidiView / 12) * 12; m <= maxMidiView; m += 12) {
          const y = h - ((m - minMidiView) / (maxMidiView - minMidiView)) * h;
          ctx.lineWidth = 1;
          ctx.strokeStyle = "rgba(255,255,255,.05)";
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();

          // label
          const info = midiToNote(m);
          ctx.fillStyle = "rgba(255,255,255,.12)";
          ctx.font = "10px 'JetBrains Mono', monospace";
          ctx.fillText(formatHi(info.name, info.octave), 4, y - 3);
        }

        // min/max lines
        if (minMidi !== null) {
          const y = h - ((minMidi - minMidiView) / (maxMidiView - minMidiView)) * h;
          ctx.strokeStyle = "rgba(244,63,94,.65)";
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
          ctx.setLineDash([]);
        }
        if (maxMidi !== null) {
          const y = h - ((maxMidi - minMidiView) / (maxMidiView - minMidiView)) * h;
          ctx.strokeStyle = "rgba(6,182,212,.65)";
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
          ctx.setLineDash([]);
        }

        // pitch line（null = 無音ギャップ → 線を切る）
        if (history.length >= 2) {
          const drawLine = (lineWidth, strokeStyle) => {
            ctx.lineWidth = lineWidth;
            ctx.strokeStyle = strokeStyle;
            ctx.lineJoin = "round";
            ctx.lineCap  = "round";
            ctx.beginPath();
            let penDown = false;
            for (let i = 0; i < history.length; i++) {
              const x    = (i / Math.max(1, history.length - 1)) * w;
              const midi = history[i].midiFloat;
              if (midi === null) {
                // 無音区間 → ペンを上げる
                penDown = false;
              } else {
                const y = h - ((midi - minMidiView) / (maxMidiView - minMidiView)) * h;
                if (!penDown) { ctx.moveTo(x, y); penDown = true; }
                else            ctx.lineTo(x, y);
              }
            }
            ctx.stroke();
          };

          // glow pass
          drawLine(GRAPH_LINE_W + 3, "rgba(124,58,237,.18)");
          // main line
          drawLine(GRAPH_LINE_W, "rgba(224,231,255,.90)");
          ctx.lineWidth = 1;
        }
      }

      function updateStats() {
        if (minMidi === null || maxMidi === null) {
          minInfo.textContent = "Min: --";
          maxInfo.textContent = "Max: --";
          spanInfo.textContent = "Range: --";
          return;
        }
        const minNote = midiToNote(minMidi);
        const maxNote = midiToNote(maxMidi);
        const span = maxMidi - minMidi;
        const oct = Math.floor(span / 12);
        const sem = span % 12;

        minInfo.textContent = `Min: ${formatHi(minNote.name, minNote.octave)} (${minNote.name}${minNote.octave})`;
        maxInfo.textContent = `Max: ${formatHi(maxNote.name, maxNote.octave)} (${maxNote.name}${maxNote.octave})`;
        spanInfo.textContent = `Range: ${span} st (${oct}oct + ${sem})`;
      }

      // =========================================================
      //  ビブラート判定 — 改良版
      //  1. トレンド除去（移動平均）で純粋な揺れ成分を抽出
      //  2. Hanning窓付きDFTでビブラート帯域（4〜8Hz）のパワーを計測
      //  3. SNR（信号対帯域外ノイズ比）とピーク/揺れ幅で複合判定
      //  4. 連続フレームでのカウントによりヒステリシスを強化
      // =========================================================
      function estimateVibratoQuality(series) {
        if (series.length < 20) return null;

        // サンプリングレートを実測
        const dt = (series[series.length - 1].t - series[0].t) / (series.length - 1);
        if (!isFinite(dt) || dt <= 0) return null;
        const fs = 1 / dt;  // Hz

        // 生MIDIピッチ列
        const x = series.map(p => p.midiFloat);
        const N = x.length;

        // --- 1. トレンド除去（0.25秒移動平均）---
        const maN = Math.max(3, Math.round(0.25 * fs));
        const trend = new Array(N);
        let acc = 0;
        for (let i = 0; i < N; i++) {
          acc += x[i];
          if (i >= maN) acc -= x[i - maN];
          trend[i] = acc / Math.min(i + 1, maN);
        }
        // y = 揺れ成分（セミトーン単位）
        const y = x.map((v, i) => v - trend[i]);

        // --- 2. 揺れ幅チェック（peak-to-peak / 2） ---
        const yMax = Math.max(...y);
        const yMin = Math.min(...y);
        const depth = (yMax - yMin) / 2; // セミトーン片幅

        if (depth < VIB_DEPTH_MIN) {
          // 揺れが浅すぎる → ビブラートなし
          return { on: false, stable: false, strength: 0, depth, snr: 0 };
        }

        // --- 3. Hanning窓を適用 ---
        const yw = y.map((v, i) => v * (0.5 - 0.5 * Math.cos(2 * Math.PI * i / (N - 1))));

        // --- 4. DFT（ビブラート帯域のみ） ---
        const kMin = Math.max(1, Math.floor(VIB_F_MIN * N / fs));
        const kMax = Math.min(Math.floor(VIB_F_MAX * N / fs), Math.floor(N / 2) - 1);
        if (kMax <= kMin) return null;

        // 全スペクトラム計算（SNR用）
        const kNyq = Math.floor(N / 2);
        let bestVibP = 0;
        let bestVibK = kMin;
        let sumAllP = 0;

        for (let k = 1; k < kNyq; k++) {
          let re = 0, im = 0;
          const ang = -2 * Math.PI * k / N;
          for (let n = 0; n < N; n++) {
            const a = ang * n;
            re += yw[n] * Math.cos(a);
            im += yw[n] * Math.sin(a);
          }
          const p = re * re + im * im;
          sumAllP += p;
          if (k >= kMin && k <= kMax) {
            if (p > bestVibP) { bestVibP = p; bestVibK = k; }
          }
        }

        // SNR: ビブラート帯域ピーク / 帯域外平均
        const outbandP = sumAllP - bestVibP;
        const outbandN = kNyq - 2; // ビブラートピーク1本を除いた残り
        const avgOut = outbandP / Math.max(1, outbandN);
        const snr = bestVibP / (avgOut + 1e-12);

        // --- 5. 複合スコアで判定 ---
        const snrScore = clamp((snr - VIB_SNR_ON) / (VIB_SNR_STABLE - VIB_SNR_ON + 1e-9), 0, 1);
        const depthScore = clamp((depth - VIB_DEPTH_MIN) / 0.4, 0, 1);
        const strength = clamp(0.6 * snrScore + 0.4 * depthScore, 0, 1);

        const on = snr >= VIB_SNR_ON;
        const stable = snr >= VIB_SNR_STABLE && depth >= VIB_DEPTH_MIN * 1.5;

        return { on, stable, strength, depth, snr };
      }

      // =========================================================
      //  ビブラートUI更新
      // =========================================================
      function setVibUI(mode, hold01) {
        const pct = Math.round(hold01 * 100);
        vibStrFill.style.width = pct + "%";
        vibStrPct.textContent = pct + "%";

        // クラスリセット
        vibBox.classList.remove("vib-on", "vib-stable", "vib-weak");
        vibStrFill.classList.remove("fill-stable", "fill-weak");
        vibBadge.classList.remove("badge-on", "badge-stable", "badge-weak");

        if (mode === "STABLE") {
          vibEmoji.textContent = "🌊";
          vibLabel.textContent = "安定ビブラート！";
          vibBadge.textContent = "● STABLE";
          vibBox.classList.add("vib-stable");
          vibStrFill.classList.add("fill-stable");
          vibBadge.classList.add("badge-stable");
        } else if (mode === "ON") {
          vibEmoji.textContent = "🌀";
          vibLabel.textContent = "ビブラート検出中！";
          vibBadge.textContent = "● ON";
          vibBox.classList.add("vib-on");
          vibBadge.classList.add("badge-on");
        } else if (mode === "WEAK") {
          vibEmoji.textContent = "🫧";
          vibLabel.textContent = "ちょい揺れ";
          vibBadge.textContent = "● WEAK";
          vibBox.classList.add("vib-weak");
          vibStrFill.classList.add("fill-weak");
          vibBadge.classList.add("badge-weak");
        } else {
          vibEmoji.textContent = "😐";
          vibLabel.textContent = "まだビブラートなし";
          vibBadge.textContent = "● OFF";
        }
      }

      // ========= Mic gain =========
      function applyMicGainUI(percent) {
        MIC_GAIN = clamp(percent / 100, 0, 4);
        gainInfo.textContent = `Mic Gain: ${Math.round(MIC_GAIN * 100)}% (x${MIC_GAIN.toFixed(2)})`;
        if (gainNode) gainNode.gain.value = MIC_GAIN;
      }

      // ========= Graph UI =========
      function applyGraphUI() {
        GRAPH_WINDOW_SEC = Number(graphSecR.value);
        GRAPH_SAMPLE_MS = Number(graphMsR.value);
        GRAPH_LINE_W = Number(graphLWR.value);

        const h = Number(graphHR.value);
        canvas.height = h;
        canvas.style.height = h + "px";

        recomputeHistoryLen();
        if (history.length > HISTORY_LEN) history = history.slice(history.length - HISTORY_LEN);
        drawGraph();
      }

      function applySettings() {
        const minHz = Number(minHzInput.value);
        const maxHz = Number(maxHzInput.value);
        const vibWin = Number(vibWinInput.value);

        if (isFinite(minHz) && minHz > 10) MIN_HZ = minHz;
        if (isFinite(maxHz) && maxHz > MIN_HZ + 10) MAX_HZ = maxHz;
        if (isFinite(vibWin) && vibWin >= 0.8) VIB_WINDOW_SEC = vibWin;

        applyGraphUI();
        applyMicGainUI(Number(micGainR.value));
        drawGraph();
      }

      function currentSettingsObj() {
        return {
          minHz: Number(minHzInput.value),
          maxHz: Number(maxHzInput.value),
          vibWin: Number(vibWinInput.value),
          micGainPct: Number(micGainR.value),
          graphSec: Number(graphSecR.value),
          graphMs: Number(graphMsR.value),
          graphH: Number(graphHR.value),
          graphLW: Number(graphLWR.value),
        };
      }

      function setInputsFromObj(o) {
        if (!o || typeof o !== "object") return;
        if (typeof o.minHz === "number") minHzInput.value = String(o.minHz);
        if (typeof o.maxHz === "number") maxHzInput.value = String(o.maxHz);
        if (typeof o.vibWin === "number") vibWinInput.value = String(o.vibWin);
        if (typeof o.micGainPct === "number") { micGainR.value = String(o.micGainPct); micGainN.value = String(o.micGainPct); }
        if (typeof o.graphSec === "number") { graphSecR.value = String(o.graphSec); graphSecN.value = String(o.graphSec); }
        if (typeof o.graphMs === "number") { graphMsR.value = String(o.graphMs); graphMsN.value = String(o.graphMs); }
        if (typeof o.graphH === "number") { graphHR.value = String(o.graphH); graphHN.value = String(o.graphH); }
        if (typeof o.graphLW === "number") { graphLWR.value = String(o.graphLW); graphLWN.value = String(o.graphLW); }
        applySettings();
      }

      function saveSettingsToCookie() {
        setCookie(COOKIE_KEY, JSON.stringify(currentSettingsObj()), COOKIE_DAYS);
        toast("✅ 保存しました");
      }
      function loadSettingsFromCookie(silent = false) {
        const raw = getCookie(COOKIE_KEY);
        if (!raw) { if (!silent) toast("⚠ 保存なし"); return; }
        try {
          setInputsFromObj(JSON.parse(raw));
          if (!silent) toast("↩ 読み込みOK");
        } catch (e) {
          if (!silent) toast("❌ 読み込み失敗");
        }
      }
      function clearSettingsCookie() {
        deleteCookie(COOKIE_KEY);
        toast("🧽 保存データを消しました");
      }

      function onSettingChanged() {
        applySettings();
        saveSettingsToCookie();
      }

      // ===== bind ranges <-> numbers =====
      bindRangeNumber(micGainR, micGainN, (v) => { applyMicGainUI(v); onSettingChanged(); });
      bindRangeNumber(graphSecR, graphSecN, () => { applyGraphUI(); onSettingChanged(); });
      bindRangeNumber(graphMsR, graphMsN, () => { applyGraphUI(); onSettingChanged(); });
      bindRangeNumber(graphHR, graphHN, () => { applyGraphUI(); onSettingChanged(); });
      bindRangeNumber(graphLWR, graphLWN, () => { applyGraphUI(); onSettingChanged(); });

      [minHzInput, maxHzInput, vibWinInput].forEach(el => {
        el.addEventListener("change", onSettingChanged);
      });

      saveBtn.addEventListener("click", saveSettingsToCookie);
      loadBtn.addEventListener("click", () => loadSettingsFromCookie(false));
      clearBtn.addEventListener("click", clearSettingsCookie);

      // 初回
      loadSettingsFromCookie(true);
      applySettings();
      setVibUI("OFF", 0);

      // ========= Main loop =========
      function render() {
        analyser.getFloatTimeDomainData(buf);
        const f = autoCorrelate(buf, audioCtx.sampleRate);
        const nowT = performance.now() / 1000;

        if (f > 0 && f >= 40 && f <= 2100) {
          const midiFloat = freqToMidi(f);
          const { name, octave, cents } = midiToNote(midiFloat);

          hiLabel.textContent = formatHi(name, octave);
          detail.textContent = `Hz: ${f.toFixed(2)}  /  Note: ${name}${octave}  /  Cents: ${cents >= 0 ? "+" : ""}${cents}`;

          // グラフサンプル追加（音あり → 実値を記録）
          if (nowT - lastGraphSampleT >= GRAPH_SAMPLE_MS / 1000) {
            lastGraphSampleT = nowT;
            history.push({ t: nowT, midiFloat });          // midiFloat は数値
            if (history.length > HISTORY_LEN) history.shift();

            const midiRounded = Math.round(midiFloat);
            if (minMidi === null || midiRounded < minMidi) minMidi = midiRounded;
            if (maxMidi === null || midiRounded > maxMidi) maxMidi = midiRounded;

            updateStats();
            drawGraph();
          }

          // ビブラート解析用系列を蓄積
          vibSeries.push({ t: nowT, midiFloat });
          const vibCut = nowT - VIB_WINDOW_SEC;
          while (vibSeries.length && vibSeries[0].t < vibCut) vibSeries.shift();

          // フレームごとに判定（軽量化：3フレームごと）
          if (history.length % 3 === 0 && vibSeries.length >= 20) {
            const vib = estimateVibratoQuality(vibSeries);

            if (vib) {
              if (vib.stable) {
                lastVibGoodT = nowT;
                consecutiveVibFrames = Math.min(consecutiveVibFrames + 1, 30);
                vibHold += 0.20 + 0.50 * vib.strength;
              } else if (vib.on) {
                lastVibGoodT = nowT;
                consecutiveVibFrames = Math.min(consecutiveVibFrames + 1, 30);
                vibHold += 0.14 + 0.30 * vib.strength;
              } else if (vib.strength > 0.1) {
                lastVibBadT = nowT;
                consecutiveVibFrames = Math.max(consecutiveVibFrames - 1, 0);
                vibHold += 0.04;
              } else {
                consecutiveVibFrames = Math.max(consecutiveVibFrames - 2, 0);
                vibHold -= 0.15;
              }
            } else {
              vibHold -= 0.12;
            }
            vibHold = clamp(vibHold, 0, 1);

            const sinceGood = nowT - lastVibGoodT;
            const sinceBad = nowT - lastVibBadT;

            let mode = "OFF";
            const goodRecent = sinceGood < VIB_LOSE_SEC;

            if (goodRecent && vibHold > 0.75 && consecutiveVibFrames >= 5) mode = "STABLE";
            else if (goodRecent && vibHold > 0.45) mode = "ON";
            else if (sinceBad < 0.45 && vibHold > 0.20) mode = "WEAK";

            setVibUI(mode, vibHold);
          }

        } else {
          // 音なし
          hiLabel.textContent = "---";
          detail.textContent = "Hz: --  /  Note: --  /  Cents: --";

          // グラフサンプル追加（音なし → null を記録してグラフをスクロールさせる）
          if (nowT - lastGraphSampleT >= GRAPH_SAMPLE_MS / 1000) {
            lastGraphSampleT = nowT;
            history.push({ t: nowT, midiFloat: null });    // null = 無音ギャップ
            if (history.length > HISTORY_LEN) history.shift();
            drawGraph();
          }

          consecutiveVibFrames = Math.max(consecutiveVibFrames - 3, 0);
          vibHold = clamp(vibHold - 0.20, 0, 1);
          if (vibHold > 0.3) setVibUI("WEAK", vibHold);
          else setVibUI("OFF", vibHold);
        }

        rafId = requestAnimationFrame(render);
      }

      async function start() {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        buf = new Float32Array(analyser.fftSize);

        src = audioCtx.createMediaStreamSource(stream);
        gainNode = audioCtx.createGain();
        gainNode.gain.value = MIC_GAIN;

        src.connect(gainNode);
        gainNode.connect(analyser);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        resetBtn.disabled = false;

        history = [];
        vibSeries = [];
        minMidi = null;
        maxMidi = null;
        vibHold = 0;
        lastVibGoodT = 0;
        lastVibBadT = 0;
        lastGraphSampleT = 0;
        consecutiveVibFrames = 0;

        updateStats();
        drawGraph();
        setVibUI("OFF", 0);
        applyMicGainUI(Number(micGainR.value));

        render();
      }

      function stop() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
        if (audioCtx) audioCtx.close();
        audioCtx = null;
        gainNode = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      function resetAll() {
        history = [];
        vibSeries = [];
        minMidi = null;
        maxMidi = null;
        vibHold = 0;
        consecutiveVibFrames = 0;
        hiLabel.textContent = "---";
        detail.textContent = "Hz: --  /  Note: --  /  Cents: --";
        setVibUI("OFF", 0);
        drawGraph();
        updateStats();
      }

      startBtn.addEventListener("click", () => start().catch(err => alert("マイクが使えませんでした: " + err.message)));
      stopBtn.addEventListener("click", stop);
      resetBtn.addEventListener("click", resetAll);

      // canvas は常に親要素幅に追従
      const ro = new ResizeObserver(() => {
        const w = canvas.parentElement.clientWidth - 28;
        canvas.width = Math.max(400, w);
        drawGraph();
      });
      ro.observe(canvas.parentElement);
    })();
  </script>
</body>

</html>
