<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pitch → hiA表記 / 音域グラフ / ビブラート検知（絵文字）</title>
  <style>
    :root{
      --bg:#0b0f19; --text:#e6e9f2; --muted:#9aa3b2;
      --shadow: 0 18px 60px rgba(0,0,0,.35); --radius: 18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(124,58,237,.35), transparent 60%),
                  radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.22), transparent 60%),
                  var(--bg);
      color:var(--text);
      padding: 22px;
    }
    .wrap{ max-width: 980px; margin: 0 auto; }
    header{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom: 14px; }
    h1{ margin:0; font-size: 20px; letter-spacing:.2px; color: rgba(230,233,242,.96); }
    .sub{ margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      transition: transform .06s ease, border-color .2s ease, background .2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      font-size: 14px;
    }
    button:hover{ border-color: rgba(255,255,255,.16); transform: translateY(-1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
    .primary{
      border-color: rgba(124,58,237,.35);
      background: linear-gradient(180deg, rgba(124,58,237,.35), rgba(124,58,237,.12));
    }
    .danger{
      border-color: rgba(239,68,68,.35);
      background: linear-gradient(180deg, rgba(239,68,68,.28), rgba(239,68,68,.10));
    }
    .ghost{
      border-color: rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      box-shadow: none;
    }

    .card{
      background: linear-gradient(180deg, rgba(16,24,43,.92), rgba(15,23,42,.92));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .topRow{ display:flex; gap: 14px; flex-wrap:wrap; align-items: stretch; }

    .bigPitch{
      flex: 1 1 320px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    .pitchLabel{ font-size: 48px; font-weight: 800; letter-spacing: .5px; line-height: 1.05; }
    .pitchMeta{ margin-top: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: rgba(230,233,242,.92); font-size: 13px; }
    .hint{ margin-top: 8px; font-size: 12px; color: var(--muted); }

    .vibBox{
      flex: 1 1 260px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
      display:flex;
      flex-direction:column;
      gap:10px;
      justify-content:space-between;
      min-height: 124px;
    }
    .vibTitle{ font-size: 12px; color: var(--muted); letter-spacing:.3px; }
    .vibState{ font-size: 26px; font-weight: 800; display:flex; align-items:center; gap:10px; }
    .badge{
      display:inline-flex; align-items:center;
      padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      font-size: 12px; color: rgba(230,233,242,.92);
      width: fit-content;
    }

    .barWrap{
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      overflow:hidden;
      position: relative;
    }
    .bar{
      position: absolute;
      left: 0; bottom: 0;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(124,58,237,.95), rgba(34,197,94,.9));
      transition: width .15s ease, height .15s ease;
    }

    .canvasWrap{
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    canvas{ width:100%; height: 240px; display:block; }
    .stats{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .pill{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; color: rgba(230,233,242,.92);
      padding: 7px 10px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.12);
    }

    details{ margin-top: 12px; }
    summary{ cursor:pointer; color: rgba(230,233,242,.95); }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .input{
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
    }
    label{ font-size: 12px; color: var(--muted); display:block; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .row2{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    input[type="range"]{ width:100%; }
    @media (max-width: 820px){
      .grid{ grid-template-columns: 1fr; }
      .pitchLabel{ font-size: 44px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Pitch → hiA表記 / 音域グラフ / ビブラート検知（絵文字）</h1>
        <div class="sub">グラフの速さ・見た目（高さ/線）も調整できます。設定はCookie保存。</div>
      </div>
      <div class="actions">
        <button class="primary" id="start">🎙️ 開始</button>
        <button id="stop" disabled>⏹ 停止</button>
        <button class="danger" id="reset" disabled>🧹 リセット</button>
      </div>
    </header>

    <div class="card">
      <div class="topRow">
        <div class="bigPitch">
          <div class="pitchLabel" id="hiLabel">---</div>
          <div class="pitchMeta" id="detail">Hz: -- / Note: -- / Cents: --</div>
          <div class="hint">目安：A4=hiA（440Hz） / C4=mid2C</div>
        </div>

        <div class="vibBox">
          <div class="vibTitle">VIBRATO DETECTOR</div>
          <div class="vibState" id="vibState">😐 まだビブラートなし</div>
          <div class="badge" id="vibBadge">判定: OFF</div>
          <div id="vibBarWrap" class="barWrap">
            <div id="vibBar" class="bar"></div>
          </div>
        </div>
      </div>

      <div class="canvasWrap">
        <canvas id="graph" width="900" height="240"></canvas>
        <div class="stats">
          <div class="pill" id="minInfo">Min: --</div>
          <div class="pill" id="maxInfo">Max: --</div>
          <div class="pill" id="spanInfo">Range: --</div>
          <div class="pill mono" id="speedInfo">Graph: --</div>
        </div>

        <details>
          <summary>設定（Cookie保存）</summary>

          <div class="grid">
            <div>
              <label class="mono">グラフ表示Hz下限</label>
              <input class="input mono" id="minHz" type="number" value="65" min="20" max="2000" step="1">
            </div>
            <div>
              <label class="mono">グラフ表示Hz上限</label>
              <input class="input mono" id="maxHz" type="number" value="1200" min="50" max="5000" step="1">
            </div>
            <div>
              <label class="mono">ビブラート解析窓 秒（2.5推奨）</label>
              <input class="input mono" id="vibWin" type="number" value="2.5" min="0.8" max="5" step="0.1">
            </div>
            <div>
              <label class="mono">検知感度（小さいほど拾いやすい）</label>
              <input class="input mono" id="vibThr" type="number" value="0.02" min="0.00" max="0.30" step="0.01">
            </div>
          </div>

          <div class="grid">
            <div>
              <label class="mono">ビブラートバー向き</label>
              <select class="input mono" id="barOri">
                <option value="h">横</option>
                <option value="v">縦</option>
              </select>
            </div>
            <div>
              <label class="mono">バー長さ（px）</label>
              <input class="mono" id="barLen" type="range" min="80" max="420" value="240">
              <div class="sub mono" id="barLenLabel">240px</div>
            </div>
            <div>
              <label class="mono">バー太さ（px）</label>
              <input class="mono" id="barThk" type="range" min="6" max="28" value="10">
              <div class="sub mono" id="barThkLabel">10px</div>
            </div>
            <div>
              <label class="mono">バー位置（縦向き時）</label>
              <select class="input mono" id="barSide">
                <option value="auto">自動</option>
                <option value="right">右寄せ</option>
                <option value="left">左寄せ</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div>
              <label class="mono">グラフ表示時間（秒）※大きいほど「ゆっくり流れる」</label>
              <input class="mono" id="graphSec" type="range" min="2" max="20" value="8" step="1">
              <div class="sub mono" id="graphSecLabel">8s</div>
            </div>
            <div>
              <label class="mono">点の追加間隔（ms）※小さいほど「速く更新」</label>
              <input class="mono" id="graphMs" type="range" min="20" max="300" value="60" step="5">
              <div class="sub mono" id="graphMsLabel">60ms</div>
            </div>
            <div>
              <label class="mono">グラフ高さ（px）</label>
              <input class="mono" id="graphH" type="range" min="160" max="420" value="240" step="10">
              <div class="sub mono" id="graphHLabel">240px</div>
            </div>
            <div>
              <label class="mono">線の太さ</label>
              <input class="mono" id="graphLW" type="range" min="1" max="5" value="2" step="1">
              <div class="sub mono" id="graphLWLabel">2</div>
            </div>
          </div>

          <div class="row2">
            <button class="ghost" id="saveBtn">💾 設定を保存</button>
            <button class="ghost" id="loadBtn">↩ 設定を読み込み</button>
            <button class="ghost" id="clearBtn">🧽 保存設定を消す</button>
          </div>
        </details>
      </div>
    </div>
  </div>

<script>
(() => {
  // ===== Cookie helper =====
  const COOKIE_KEY = "pitch_tool_settings_v3";
  const COOKIE_DAYS = 365;
  const setCookie = (name, value, days) => {
    const d = new Date();
    d.setTime(d.getTime() + (days*24*60*60*1000));
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
  };
  const getCookie = (name) => {
    const target = name + "=";
    for (const p of document.cookie.split(";").map(s=>s.trim())) {
      if (p.startsWith(target)) return decodeURIComponent(p.substring(target.length));
    }
    return null;
  };
  const deleteCookie = (name) => {
    document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
  };

  // ========= UI =========
  const startBtn = document.getElementById("start");
  const stopBtn  = document.getElementById("stop");
  const resetBtn = document.getElementById("reset");

  const hiLabel  = document.getElementById("hiLabel");
  const detail   = document.getElementById("detail");

  const vibState = document.getElementById("vibState");
  const vibBadge = document.getElementById("vibBadge");
  const vibBarWrap = document.getElementById("vibBarWrap");
  const vibBar   = document.getElementById("vibBar");

  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  const minInfo = document.getElementById("minInfo");
  const maxInfo = document.getElementById("maxInfo");
  const spanInfo = document.getElementById("spanInfo");
  const speedInfo = document.getElementById("speedInfo");

  const minHzInput = document.getElementById("minHz");
  const maxHzInput = document.getElementById("maxHz");
  const vibWinInput = document.getElementById("vibWin");
  const vibThrInput = document.getElementById("vibThr");

  const barOriSel = document.getElementById("barOri");
  const barLenRng = document.getElementById("barLen");
  const barThkRng = document.getElementById("barThk");
  const barSideSel = document.getElementById("barSide");
  const barLenLabel = document.getElementById("barLenLabel");
  const barThkLabel = document.getElementById("barThkLabel");

  const graphSecRng = document.getElementById("graphSec");
  const graphMsRng  = document.getElementById("graphMs");
  const graphHRng   = document.getElementById("graphH");
  const graphLWRng  = document.getElementById("graphLW");
  const graphSecLabel = document.getElementById("graphSecLabel");
  const graphMsLabel  = document.getElementById("graphMsLabel");
  const graphHLabel   = document.getElementById("graphHLabel");
  const graphLWLabel  = document.getElementById("graphLWLabel");

  const saveBtn = document.getElementById("saveBtn");
  const loadBtn = document.getElementById("loadBtn");
  const clearBtn = document.getElementById("clearBtn");

  function toast(msg){ vibBadge.textContent = msg; }

  // ========= Audio =========
  let audioCtx, analyser, buf, src, stream, rafId;

  // ========= Settings =========
  let MIN_HZ = 65;
  let MAX_HZ = 1200;

  let VIB_WINDOW_SEC = 2.5;
  let VIB_THRESH_SD = 0.02;
  const VIB_F_MIN = 3.5;
  const VIB_F_MAX = 9.0;
  const VIB_LOSE_SEC = 0.25;

  // Bar settings
  let BAR_ORI = "h";
  let BAR_LEN = 240;
  let BAR_THK = 10;
  let BAR_SIDE = "auto";

  // Graph speed/appearance
  let GRAPH_WINDOW_SEC = 8;     // 画面に見せる秒数
  let GRAPH_SAMPLE_MS = 60;     // 何msごとに点を追加
  let GRAPH_LINE_W = 2;         // 線の太さ
  let HISTORY_LEN = 240;        // GRAPH_WINDOW_SEC / GRAPH_SAMPLE_MS から自動計算

  // ========= State =========
  let history = [];   // {t, midiFloat}
  let minMidi = null;
  let maxMidi = null;

  let vibSeries = [];
  let vibHold = 0;
  let lastVibGoodT = 0;
  let lastVibBadT = 0;

  let lastGraphSampleT = 0; // 点追加用

  // ========= Pitch helpers =========
  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const freqToMidi = (f) => 69 + 12 * Math.log2(f / 440);
  function midiToNote(midiFloat) {
    const m = Math.round(midiFloat);
    const name = NOTE_NAMES[(m % 12 + 12) % 12];
    const octave = Math.floor(m / 12) - 1;
    const cents = Math.round((midiFloat - m) * 100);
    return { name, octave, cents, midi: m, midiFloat };
  }
  function octavePrefix(octave) {
    if (octave <= 1) return "low";
    if (octave === 2) return "mid1";
    if (octave === 3) return "mid2";
    if (octave === 4) return "hi";
    if (octave === 5) return "hihi";
    return "hihihi";
  }
  const formatHi = (name, octave) => `${octavePrefix(octave)}${name.replace("#","is")}`;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

  // ========= Autocorrelation =========
  function autoCorrelate(buf, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / buf.length);
    if (rms < 0.01) return -1;

    let start = 0, end = buf.length - 1;
    while (start < end && Math.abs(buf[start]) < 0.2) start++;
    while (end > start && Math.abs(buf[end]) < 0.2) end--;
    const trimmed = buf.slice(start, end);
    const size = trimmed.length;
    const c = new Float32Array(size);

    for (let lag = 0; lag < size; lag++) {
      let sum = 0;
      for (let i = 0; i < size - lag; i++) sum += trimmed[i] * trimmed[i + lag];
      c[lag] = sum;
    }

    let d = 0;
    while (d < size - 1 && c[d] > c[d + 1]) d++;

    let maxval = -1, maxpos = -1;
    for (let i = d; i < size; i++) {
      if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
    }
    if (maxpos <= 0) return -1;

    const x1 = maxpos - 1, x2 = maxpos, x3 = maxpos + 1;
    if (x1 >= 0 && x3 < size) {
      const y1 = c[x1], y2 = c[x2], y3 = c[x3];
      const a = (y1 + y3 - 2 * y2) / 2;
      const b = (y3 - y1) / 2;
      if (a) {
        const shift = -b / (2 * a);
        return sampleRate / (maxpos + shift);
      }
    }
    return sampleRate / maxpos;
  }

  // ========= Graph =========
  function recomputeHistoryLen(){
    HISTORY_LEN = Math.max(10, Math.round((GRAPH_WINDOW_SEC * 1000) / GRAPH_SAMPLE_MS));
    speedInfo.textContent = `Graph: ${GRAPH_WINDOW_SEC}s window / ${GRAPH_SAMPLE_MS}ms sample / points≈${HISTORY_LEN}`;
  }

  function drawGraph() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);

    ctx.fillStyle = "rgba(0,0,0,.12)";
    ctx.fillRect(0,0,w,h);

    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(255,255,255,.10)";
    ctx.strokeRect(0.5,0.5,w-1,h-1);

    const minMidiView = freqToMidi(MIN_HZ);
    const maxMidiView = freqToMidi(MAX_HZ);

    // grid
    ctx.strokeStyle = "rgba(255,255,255,.06)";
    for (let m = Math.ceil(minMidiView/12)*12; m <= maxMidiView; m += 12) {
      const y = h - ( (m - minMidiView) / (maxMidiView - minMidiView) ) * h;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // min/max
    if (minMidi !== null) {
      const y = h - ((minMidi - minMidiView) / (maxMidiView - minMidiView)) * h;
      ctx.strokeStyle = "rgba(236,72,153,.75)";
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }
    if (maxMidi !== null) {
      const y = h - ((maxMidi - minMidiView) / (maxMidiView - minMidiView)) * h;
      ctx.strokeStyle = "rgba(34,211,238,.75)";
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }

    // line
    if (history.length >= 2) {
      ctx.lineWidth = GRAPH_LINE_W;
      ctx.strokeStyle = "rgba(230,233,242,.92)";
      ctx.beginPath();

      for (let i = 0; i < history.length; i++) {
        const x = (i / (Math.max(1, history.length - 1))) * w;
        const midi = history[i].midiFloat;
        const y = h - ((midi - minMidiView) / (maxMidiView - minMidiView)) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  function updateStats() {
    if (minMidi === null || maxMidi === null) {
      minInfo.textContent = "Min: --";
      maxInfo.textContent = "Max: --";
      spanInfo.textContent = "Range: --";
      return;
    }
    const minNote = midiToNote(minMidi);
    const maxNote = midiToNote(maxMidi);
    const span = maxMidi - minMidi;

    minInfo.textContent = `Min: ${formatHi(minNote.name, minNote.octave)} (${minNote.name}${minNote.octave})`;
    maxInfo.textContent = `Max: ${formatHi(maxNote.name, maxNote.octave)} (${maxNote.name}${maxNote.octave})`;

    const oct = Math.floor(span / 12);
    const sem = span % 12;
    spanInfo.textContent = `Range: ${span} semitones (${oct} oct + ${sem})`;
  }

  // ========= Vibrato =========
  function estimateVibratoQuality(series) {
    if (series.length < 24) return null;

    const dt = (series[series.length - 1].t - series[0].t) / (series.length - 1);
    if (!isFinite(dt) || dt <= 0) return null;
    const fs = 1 / dt;

    const x = series.map(p => p.midiFloat);

    const maSec = 0.20;
    const maN = Math.max(3, Math.round(maSec * fs));
    const trend = new Array(x.length).fill(0);
    let acc = 0;
    for (let i = 0; i < x.length; i++) {
      acc += x[i];
      if (i >= maN) acc -= x[i - maN];
      const n = Math.min(i + 1, maN);
      trend[i] = acc / n;
    }
    const y = x.map((v, i) => v - trend[i]);

    const N = y.length;
    const mean = y.reduce((a,b)=>a+b,0)/N;
    const sd = Math.sqrt(y.reduce((a,b)=>a+(b-mean)*(b-mean),0)/N);
    if (sd < VIB_THRESH_SD) return { on:false, strength: 0 };

    for (let i = 0; i < N; i++) {
      const w = 0.5 - 0.5 * Math.cos((2 * Math.PI * i) / (N - 1));
      y[i] *= w;
    }

    const kMin = Math.max(1, Math.floor(VIB_F_MIN * N / fs));
    const kMax = Math.min(Math.floor(VIB_F_MAX * N / fs), Math.floor(N/2)-1);
    if (kMax <= kMin) return null;

    let bestP = 0, sumP = 0, cntP = 0;

    for (let k = kMin; k <= kMax; k++) {
      let re = 0, im = 0;
      const ang = -2 * Math.PI * k / N;
      for (let n = 0; n < N; n++) {
        const a = ang * n;
        re += y[n] * Math.cos(a);
        im += y[n] * Math.sin(a);
      }
      const p = re*re + im*im;
      sumP += p; cntP++;
      if (p > bestP) bestP = p;
    }

    const avgP = sumP / Math.max(1, cntP);
    const snr = bestP / (avgP + 1e-12);

    const snr01 = clamp((snr - 1.2) / 4.0, 0, 1);
    const sd01  = clamp((sd - VIB_THRESH_SD) / 0.10, 0, 1);
    const strength = clamp(0.55*snr01 + 0.45*sd01, 0, 1);

    const on = (snr >= 2.2);
    return { on, strength };
  }

  // ========= Bar layout =========
  function setVibGauge(value01){
    const pct = Math.round(clamp(value01,0,1) * 100);
    if (BAR_ORI === "h") {
      vibBar.style.width = pct + "%";
      vibBar.style.height = "100%";
    } else {
      vibBar.style.height = pct + "%";
      vibBar.style.width = "100%";
    }
  }

  function applyBarLayout() {
    BAR_ORI = barOriSel.value;
    BAR_LEN = Number(barLenRng.value);
    BAR_THK = Number(barThkRng.value);
    BAR_SIDE = barSideSel.value;

    barLenLabel.textContent = `${BAR_LEN}px`;
    barThkLabel.textContent = `${BAR_THK}px`;

    if (BAR_ORI === "h") {
      vibBarWrap.style.width = BAR_LEN + "px";
      vibBarWrap.style.height = BAR_THK + "px";
      vibBarWrap.style.marginLeft = "0";
      vibBarWrap.style.marginRight = "0";
      vibBar.style.left = "0"; vibBar.style.bottom = "0";
      vibBar.style.height = "100%"; vibBar.style.width = "0%";
    } else {
      vibBarWrap.style.width = BAR_THK + "px";
      vibBarWrap.style.height = BAR_LEN + "px";
      if (BAR_SIDE === "right") { vibBarWrap.style.marginLeft = "auto"; vibBarWrap.style.marginRight = "0"; }
      else if (BAR_SIDE === "left") { vibBarWrap.style.marginLeft = "0"; vibBarWrap.style.marginRight = "auto"; }
      else { vibBarWrap.style.marginLeft = "auto"; vibBarWrap.style.marginRight = "0"; }
      vibBar.style.left = "0"; vibBar.style.bottom = "0";
      vibBar.style.width = "100%"; vibBar.style.height = "0%";
    }
    setVibGauge(vibHold);
  }

  function setVibUI(mode, hold01) {
    setVibGauge(hold01);

    if (mode === "STABLE") {
      vibState.textContent = "🌪️ 安定ビブラート！";
      vibBadge.textContent = "判定: STABLE";
      vibBadge.style.borderColor = "rgba(34,197,94,.45)";
      vibBadge.style.background = "rgba(34,197,94,.12)";
    } else if (mode === "ON") {
      vibState.textContent = "🌀 ビブラート！";
      vibBadge.textContent = "判定: ON";
      vibBadge.style.borderColor = "rgba(124,58,237,.55)";
      vibBadge.style.background = "rgba(124,58,237,.14)";
    } else if (mode === "WEAK") {
      vibState.textContent = "🫧 ちょい揺れ";
      vibBadge.textContent = "判定: WEAK";
      vibBadge.style.borderColor = "rgba(245,158,11,.50)";
      vibBadge.style.background = "rgba(245,158,11,.12)";
    } else {
      vibState.textContent = "😐 まだビブラートなし";
      vibBadge.textContent = "判定: OFF";
      vibBadge.style.borderColor = "rgba(255,255,255,.14)";
      vibBadge.style.background = "rgba(255,255,255,.05)";
    }
  }

  // ========= Settings apply / save/load =========
  function applyGraphUI(){
    GRAPH_WINDOW_SEC = Number(graphSecRng.value);
    GRAPH_SAMPLE_MS  = Number(graphMsRng.value);
    GRAPH_LINE_W     = Number(graphLWRng.value);

    graphSecLabel.textContent = `${GRAPH_WINDOW_SEC}s`;
    graphMsLabel.textContent  = `${GRAPH_SAMPLE_MS}ms`;
    graphLWLabel.textContent  = `${GRAPH_LINE_W}`;

    // canvas height (css + actual)
    const h = Number(graphHRng.value);
    graphHLabel.textContent = `${h}px`;
    canvas.height = h;
    canvas.style.height = h + "px";

    recomputeHistoryLen();

    // 履歴が長すぎたらカット（短すぎてもOK）
    if (history.length > HISTORY_LEN) history = history.slice(history.length - HISTORY_LEN);

    drawGraph();
  }

  function applySettings() {
    const minHz = Number(minHzInput.value);
    const maxHz = Number(maxHzInput.value);
    const vibWin = Number(vibWinInput.value);
    const vibThr = Number(vibThrInput.value);

    if (isFinite(minHz) && minHz > 10) MIN_HZ = minHz;
    if (isFinite(maxHz) && maxHz > MIN_HZ + 10) MAX_HZ = maxHz;
    if (isFinite(vibWin) && vibWin >= 0.8) VIB_WINDOW_SEC = vibWin;
    if (isFinite(vibThr) && vibThr >= 0) VIB_THRESH_SD = vibThr;

    applyBarLayout();
    applyGraphUI();
    drawGraph();
  }

  function currentSettingsObj() {
    return {
      minHz: Number(minHzInput.value),
      maxHz: Number(maxHzInput.value),
      vibWin: Number(vibWinInput.value),
      vibThr: Number(vibThrInput.value),
      barOri: barOriSel.value,
      barLen: Number(barLenRng.value),
      barThk: Number(barThkRng.value),
      barSide: barSideSel.value,
      graphSec: Number(graphSecRng.value),
      graphMs: Number(graphMsRng.value),
      graphH: Number(graphHRng.value),
      graphLW: Number(graphLWRng.value),
    };
  }

  function setInputsFromObj(o) {
    if (!o || typeof o !== "object") return;

    if (typeof o.minHz === "number") minHzInput.value = String(o.minHz);
    if (typeof o.maxHz === "number") maxHzInput.value = String(o.maxHz);
    if (typeof o.vibWin === "number") vibWinInput.value = String(o.vibWin);
    if (typeof o.vibThr === "number") vibThrInput.value = String(o.vibThr);

    if (typeof o.barOri === "string") barOriSel.value = o.barOri;
    if (typeof o.barLen === "number") barLenRng.value = String(o.barLen);
    if (typeof o.barThk === "number") barThkRng.value = String(o.barThk);
    if (typeof o.barSide === "string") barSideSel.value = o.barSide;

    if (typeof o.graphSec === "number") graphSecRng.value = String(o.graphSec);
    if (typeof o.graphMs === "number") graphMsRng.value = String(o.graphMs);
    if (typeof o.graphH === "number") graphHRng.value = String(o.graphH);
    if (typeof o.graphLW === "number") graphLWRng.value = String(o.graphLW);

    applySettings();
  }

  function saveSettingsToCookie() {
    setCookie(COOKIE_KEY, JSON.stringify(currentSettingsObj()), COOKIE_DAYS);
    toast("✅ 保存しました");
  }
  function loadSettingsFromCookie(silent=false) {
    const raw = getCookie(COOKIE_KEY);
    if (!raw) { if (!silent) toast("⚠ 保存なし"); return; }
    try{
      setInputsFromObj(JSON.parse(raw));
      if (!silent) toast("↩ 読み込みOK");
    } catch(e){
      if (!silent) toast("❌ 読み込み失敗");
    }
  }
  function clearSettingsCookie() {
    deleteCookie(COOKIE_KEY);
    toast("🧽 消しました");
  }

  function onSettingChanged() {
    applySettings();
    saveSettingsToCookie();
  }

  // input/ change handlers
  const changeEls = [minHzInput, maxHzInput, vibWinInput, vibThrInput, barOriSel, barSideSel];
  changeEls.forEach(el => el.addEventListener("change", onSettingChanged));

  const inputEls = [barLenRng, barThkRng, graphSecRng, graphMsRng, graphHRng, graphLWRng];
  inputEls.forEach(el => el.addEventListener("input", onSettingChanged));

  saveBtn.addEventListener("click", saveSettingsToCookie);
  loadBtn.addEventListener("click", () => loadSettingsFromCookie(false));
  clearBtn.addEventListener("click", clearSettingsCookie);

  // 初回ロード
  loadSettingsFromCookie(true);
  applySettings();
  setVibUI("OFF", 0);

  // ========= Main loop =========
  function render() {
    analyser.getFloatTimeDomainData(buf);
    const f = autoCorrelate(buf, audioCtx.sampleRate);
    const nowT = performance.now() / 1000;

    if (f > 0 && f >= 40 && f <= 2000) {
      const midiFloat = freqToMidi(f);
      const { name, octave, cents } = midiToNote(midiFloat);

      hiLabel.textContent = formatHi(name, octave);
      detail.textContent = `Hz: ${f.toFixed(2)} / Note: ${name}${octave} / Cents: ${cents >= 0 ? "+" : ""}${cents}`;

      // ===== グラフ：時間ベースで点を追加（ms設定で制御） =====
      if (nowT - lastGraphSampleT >= (GRAPH_SAMPLE_MS / 1000)) {
        lastGraphSampleT = nowT;

        history.push({ t: nowT, midiFloat });
        if (history.length > HISTORY_LEN) history.shift();

        const midiRounded = Math.round(midiFloat);
        if (minMidi === null || midiRounded < minMidi) minMidi = midiRounded;
        if (maxMidi === null || midiRounded > maxMidi) maxMidi = midiRounded;

        updateStats();
        drawGraph();
      }

      // ===== ビブラート解析 =====
      vibSeries.push({ t: nowT, midiFloat });
      const vibCut = nowT - VIB_WINDOW_SEC;
      while (vibSeries.length && vibSeries[0].t < vibCut) vibSeries.shift();

      // 判定（点の追加と同じ周期でOK）
      if (history.length % 3 === 0) {
        const vib = estimateVibratoQuality(vibSeries);

        if (vib && vib.on) {
          lastVibGoodT = nowT;
          vibHold += 0.22 + 0.55 * vib.strength;
        } else if (vib && !vib.on && vib.strength > 0.15) {
          lastVibBadT = nowT;
          vibHold += 0.06 + 0.12 * vib.strength;
        } else {
          vibHold -= 0.18;
        }
        vibHold = clamp(vibHold, 0, 1);

        const sinceGood = nowT - lastVibGoodT;
        const sinceBad = nowT - lastVibBadT;

        let mode = "OFF";
        const goodRecent = sinceGood < VIB_LOSE_SEC;

        if (goodRecent && vibHold > 0.82) mode = "STABLE";
        else if (goodRecent) mode = "ON";
        else if (sinceBad < 0.35 && vibHold > 0.18) mode = "WEAK";
        if (mode === "ON" && vibHold > 0.65) mode = "STABLE";

        setVibUI(mode, vibHold);
      }

    } else {
      // 無音
      hiLabel.textContent = "---";
      detail.textContent = `Hz: -- / Note: -- / Cents: --`;

      vibHold = clamp(vibHold - 0.22, 0, 1);
      setVibUI(vibHold > 0.35 ? "WEAK" : "OFF", vibHold);
    }

    rafId = requestAnimationFrame(render);
  }

  async function start() {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    buf = new Float32Array(analyser.fftSize);

    src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    resetBtn.disabled = false;

    history = [];
    vibSeries = [];
    minMidi = null;
    maxMidi = null;
    vibHold = 0;
    lastVibGoodT = 0;
    lastVibBadT = 0;
    lastGraphSampleT = 0;

    updateStats();
    drawGraph();
    setVibUI("OFF", 0);

    render();
  }

  function stop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;

    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;

    if (audioCtx) audioCtx.close();
    audioCtx = null;

    startBtn.disabled = false;
    stopBtn.disabled = true;
  }

  function resetAll() {
    history = [];
    vibSeries = [];
    minMidi = null;
    maxMidi = null;
    vibHold = 0;

    hiLabel.textContent = "---";
    detail.textContent = `Hz: -- / Note: -- / Cents: --`;
    setVibUI("OFF", 0);
    drawGraph();
    updateStats();
  }

  startBtn.addEventListener("click", () => start().catch(err => alert("マイクが使えませんでした: " + err.message)));
  stopBtn.addEventListener("click", stop);
  resetBtn.addEventListener("click", resetAll);
})();
</script>
</body>
